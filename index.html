<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hachi Smoke & Vape | Coming Soon</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Poppins',sans-serif;
min-height:100vh;
background:linear-gradient(140deg,#020202,#000,#080808);
color:white;
overflow:hidden;
position:relative;
display:flex;
align-items:center;
justify-content:center;
}

/* glow background */

body::before{
content:"";
position:absolute;
width:50vw;
height:50vw;
background:#d4af37;
filter:blur(120px);
opacity:.15;
top:-20%;
left:-20%;
animation:floatGlow 18s infinite alternate ease-in-out;
}

@keyframes floatGlow{
0%{transform:translate(0,0)}
50%{transform:translate(60px,-40px)}
100%{transform:translate(-40px,40px)}
}

/* smoke */

.smoke span{
position:absolute;
bottom:-200px;
background:radial-gradient(circle,rgba(255,255,255,.15),transparent 60%);
border-radius:50%;
filter:blur(15px);
animation:smoke 20s linear infinite;
}

.smoke span:nth-child(1){width:200px;height:200px;left:10%;animation-duration:18s;}
.smoke span:nth-child(2){width:260px;height:260px;left:35%;animation-duration:22s;}
.smoke span:nth-child(3){width:180px;height:180px;left:60%;animation-duration:20s;}
.smoke span:nth-child(4){width:300px;height:300px;left:80%;animation-duration:25s;}

@keyframes smoke{
0%{transform:translateY(0);opacity:0}
30%{opacity:.3}
100%{transform:translateY(-120vh);opacity:0}
}

/* particles */

.particles span{
position:absolute;
width:3px;
height:3px;
background:#ffd977;
border-radius:50%;
box-shadow:0 0 8px #ffd977;
animation:sparkle 6s infinite;
}

.particles span:nth-child(1){top:15%;left:20%}
.particles span:nth-child(2){top:30%;left:70%}
.particles span:nth-child(3){top:50%;left:50%}
.particles span:nth-child(4){top:80%;left:25%}
.particles span:nth-child(5){top:60%;left:80%}

@keyframes sparkle{
0%,100%{opacity:.3;transform:scale(1)}
50%{opacity:1;transform:scale(1.6)}
}

/* card */

.card{
position:relative;
z-index:5;
max-width:900px;
padding:50px 40px;
background:rgba(255,255,255,.04);
border:1px solid rgba(255,215,100,.2);
border-radius:25px;
backdrop-filter:blur(10px);
text-align:center;
box-shadow:0 20px 60px rgba(0,0,0,.5);
}

/* logo */

.logo{
font-family:'Orbitron',sans-serif;
font-size:70px;
color:#ffd45c;
text-shadow:
0 1px 0 #b78612,
0 2px 0 #a8770e,
0 0 12px rgba(255,215,120,.7),
0 0 40px rgba(255,200,100,.3);
margin-bottom:15px;
animation:logoGlow 3s infinite alternate;
}

@keyframes logoGlow{
0%{filter:brightness(1)}
100%{filter:brightness(1.3)}
}

.subtitle{
color:#e7e7e7;
margin-bottom:20px;
font-size:17px;
}

/* countdown */

.timer{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
margin:30px 0;
}

.time-box{
background:rgba(255,255,255,.04);
padding:18px;
border-radius:15px;
border:1px solid rgba(255,215,120,.2);
}

.time-box strong{
display:block;
font-size:32px;
color:#ffd45c;
font-family:'Orbitron';
}

.time-box span{
font-size:12px;
color:#bbb;
}

/* email form */

.subscribe{
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
margin-top:10px;
}

.subscribe input{
padding:14px 18px;
border-radius:30px;
border:none;
min-width:250px;
background:#111;
color:white;
}

.subscribe button{
padding:14px 22px;
border:none;
border-radius:30px;
background:#d4af37;
color:#000;
font-weight:600;
cursor:pointer;
}

/* instagram */

.actions{
margin-top:25px;
}

.instagram{
padding:12px 22px;
border-radius:30px;
border:1px solid rgba(255,215,120,.3);
color:#ffd977;
text-decoration:none;
display:inline-block;
}

.instagram:hover{
background:rgba(255,255,255,.05);
}

</style>
</head>

<body>

<div class="smoke">
<span></span><span></span><span></span><span></span>
</div>

<div class="particles">
<span></span><span></span><span></span><span></span><span></span>
</div>

<div class="card">

<div class="logo">Hachi Smoke & Vape</div>

<p class="subtitle">
A new premium experience is coming soon.
</p>

<div class="timer">
<div class="time-box">
<strong id="days">00</strong>
<span>DAYS</span>
</div>

<div class="time-box">
<strong id="hours">00</strong>
<span>HOURS</span>
</div>

<div class="time-box">
<strong id="minutes">00</strong>
<span>MINUTES</span>
</div>

<div class="time-box">
<strong id="seconds">00</strong>
<span>SECONDS</span>
</div>
</div>

<div class="subscribe">
<input type="email" placeholder="Enter your email for updates">
<button>Notify Me</button>
</div>

<div class="actions">
<a class="instagram" href="https://instagram.com/" target="_blank">Instagram</a>
</div>

</div>

<script>

const launchDate = new Date("2026-05-01T00:00:00").getTime();

function countdown(){

const now = new Date().getTime();
const distance = launchDate - now;

const days = Math.floor(distance/(1000*60*60*24));
const hours = Math.floor((distance%(1000*60*60*24))/(1000*60*60));
const minutes = Math.floor((distance%(1000*60*60))/(1000*60));
const seconds = Math.floor((distance%(1000*60))/1000);

document.getElementById("days").innerHTML = days;
document.getElementById("hours").innerHTML = hours;
document.getElementById("minutes").innerHTML = minutes;
document.getElementById("seconds").innerHTML = seconds;

}

setInterval(countdown,1000);

</script>

</body>
</html>
