<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hachi Smoke & Vape</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:#000;
color:#d4af37;
font-family:Arial;
overflow:hidden;
}

.container{
text-align:center;
z-index:2;
}

h1{
font-size:60px;
letter-spacing:3px;
animation: glow 2s ease-in-out infinite alternate;
}

p{
font-size:20px;
color:#f5e7a1;
}

@keyframes glow{
from{ text-shadow:0 0 10px #d4af37;}
to{ text-shadow:0 0 30px #d4af37;}
}

/* smoke background */

.smoke{
position:absolute;
width:200%;
height:200%;
background:radial-gradient(circle, rgba(255,255,255,0.05) 10%, transparent 70%);
animation:move 20s linear infinite;
}

@keyframes move{
0%{ transform:translateY(0);}
100%{ transform:translateY(-500px);}
}

</style>

</head>

<body>

<div class="smoke"></div>

<div class="container">
<h1>HACHI SMOKE & VAPE</h1>
<p>Website launching soon</p>
</div>

</body>
</html>
