<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hachi Smoke & Vape</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --gold: #d4af37;
      --gold-soft: #f3d77a;
      --gold-deep: #9e7912;
      --bg-1: #050505;
      --bg-2: #0a0a0a;
      --glass: rgba(255, 255, 255, 0.06);
      --border: rgba(255, 215, 120, 0.18);
      --white-soft: rgba(255,255,255,0.82);
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      background:
        radial-gradient(circle at 20% 20%, rgba(212,175,55,0.12), transparent 30%),
        radial-gradient(circle at 80% 30%, rgba(212,175,55,0.08), transparent 25%),
        radial-gradient(circle at 50% 80%, rgba(255,255,255,0.04), transparent 20%),
        linear-gradient(135deg, var(--bg-1), #000 45%, var(--bg-2));
      color: white;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Animated background glow */
    body::before,
    body::after {
      content: "";
      position: absolute;
      width: 55vw;
      height: 55vw;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.16;
      z-index: 0;
      animation: drift 16s ease-in-out infinite alternate;
    }

    body::before {
      background: rgba(212, 175, 55, 0.35);
      top: -10%;
      left: -10%;
    }

    body::after {
      background: rgba(255, 210, 120, 0.20);
      bottom: -15%;
      right: -10%;
      animation-duration: 20s;
    }

    @keyframes drift {
      0% {
        transform: translate(0, 0) scale(1);
      }
      50% {
        transform: translate(40px, -30px) scale(1.08);
      }
      100% {
        transform: translate(-20px, 20px) scale(0.95);
      }
    }

    /* Smoke blobs */
    .smoke {
      position: absolute;
      inset: 0;
      overflow: hidden;
      z-index: 1;
      pointer-events: none;
    }

    .smoke span {
      position: absolute;
      display: block;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.08), rgba(255,255,255,0.01) 65%, transparent 75%);
      filter: blur(18px);
      animation: floatSmoke linear infinite;
    }

    .smoke span:nth-child(1) {
      width: 220px; height: 220px;
      left: 8%; bottom: -10%;
      animation-duration: 18s;
      animation-delay: 0s;
    }

    .smoke span:nth-child(2) {
      width: 300px; height: 300px;
      left: 22%; bottom: -18%;
      animation-duration: 24s;
      animation-delay: 3s;
    }

    .smoke span:nth-child(3) {
      width: 260px; height: 260px;
      right: 14%; bottom: -16%;
      animation-duration: 22s;
      animation-delay: 5s;
    }

    .smoke span:nth-child(4) {
      width: 180px; height: 180px;
      right: 30%; bottom: -12%;
      animation-duration: 16s;
      animation-delay: 1s;
    }

    .smoke span:nth-child(5) {
      width: 340px; height: 340px;
      left: 45%; bottom: -25%;
      animation-duration: 28s;
      animation-delay: 4s;
    }

    @keyframes floatSmoke {
      0% {
        transform: translateY(0) translateX(0) scale(0.85);
        opacity: 0;
      }
      20% {
        opacity: 0.35;
      }
      50% {
        transform: translateY(-35vh) translateX(30px) scale(1);
        opacity: 0.22;
      }
      100% {
        transform: translateY(-75vh) translateX(-20px) scale(1.2);
        opacity: 0;
      }
    }

    /* Tiny moving particles */
    .particles {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    .particles span {
      position: absolute;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: rgba(255, 222, 140, 0.8);
      box-shadow: 0 0 10px rgba(255, 215, 100, 0.7);
      animation: twinkle 6s linear infinite;
    }

    .particles span:nth-child(1) { top: 14%; left: 18%; animation-delay: 0s; }
    .particles span:nth-child(2) { top: 22%; left: 72%; animation-delay: 1s; }
    .particles span:nth-child(3) { top: 34%; left: 58%; animation-delay: 2s; }
    .particles span:nth-child(4) { top: 65%; left: 20%; animation-delay: 3s; }
    .particles span:nth-child(5) { top: 72%; left: 80%; animation-delay: 4s; }
    .particles span:nth-child(6) { top: 42%; left: 10%; animation-delay: 1.5s; }
    .particles span:nth-child(7) { top: 18%; left: 40%; animation-delay: 2.5s; }
    .particles span:nth-child(8) { top: 55%; left: 68%; animation-delay: 3.5s; }
    .particles span:nth-child(9) { top: 78%; left: 48%; animation-delay: 4.5s; }
    .particles span:nth-child(10){ top: 28%; left: 86%; animation-delay: 5s; }

    @keyframes twinkle {
      0%, 100% {
        opacity: 0.15;
        transform: translateY(0) scale(1);
      }
      50% {
        opacity: 1;
        transform: translateY(-8px) scale(1.8);
      }
    }

    /* Main content */
    .wrap {
      position: relative;
      z-index: 2;
      width: min(92%, 900px);
      padding: 34px;
    }

    .card {
      position: relative;
      padding: 60px 50px;
      border-radius: 28px;
      background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.03));
      border: 1px solid var(--border);
      backdrop-filter: blur(16px);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.03) inset,
        0 20px 60px rgba(0,0,0,0.45),
        0 0 80px rgba(212,175,55,0.08);
      text-align: center;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent 10%, rgba(255,255,255,0.05), transparent 85%);
      transform: translateX(-100%);
      animation: shine 7s linear infinite;
    }

    @keyframes shine {
      0% { transform: translateX(-120%); }
      100% { transform: translateX(120%); }
    }

    .mini {
      display: inline-block;
      margin-bottom: 18px;
      padding: 8px 16px;
      border: 1px solid rgba(255, 215, 120, 0.25);
      border-radius: 999px;
      color: var(--gold-soft);
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      background: rgba(255,255,255,0.03);
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(42px, 7vw, 88px);
      line-height: 0.98;
      margin-bottom: 18px;
      color: transparent;
      background: linear-gradient(180deg, #fff4c8 0%, #f0cc63 30%, #c7961c 65%, #fff0b0 100%);
      -webkit-background-clip: text;
      background-clip: text;
      text-shadow:
        0 0 12px rgba(212,175,55,0.25),
        0 0 28px rgba(212,175,55,0.18);
      animation: titlePulse 3s ease-in-out infinite;
    }

    @keyframes titlePulse {
      0%, 100% {
        transform: translateY(0);
        filter: brightness(1);
      }
      50% {
        transform: translateY(-2px);
        filter: brightness(1.08);
      }
    }

    .subtitle {
      color: var(--white-soft);
      font-size: clamp(16px, 2vw, 19px);
      max-width: 650px;
      margin: 0 auto 26px;
      line-height: 1.7;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
      color: #f6e7aa;
      font-size: 15px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #f6d666;
      box-shadow: 0 0 0 0 rgba(246,214,102,0.8);
      animation: ping 1.8s infinite;
    }

    @keyframes ping {
      0% {
        box-shadow: 0 0 0 0 rgba(246,214,102,0.75);
      }
      70% {
        box-shadow: 0 0 0 14px rgba(246,214,102,0);
      }
      100% {
        box-shadow: 0 0 0 0 rgba(246,214,102,0);
      }
    }

    .actions {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 160px;
      padding: 14px 24px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 600;
      transition: 0.35s ease;
      border: 1px solid transparent;
    }

    .btn-primary {
      background: linear-gradient(135deg, #f7da79, #c9981d);
      color: #111;
      box-shadow: 0 10px 25px rgba(212,175,55,0.25);
    }

    .btn-primary:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 16px 35px rgba(212,175,55,0.35);
    }

    .btn-secondary {
      color: #f4df98;
      border-color: rgba(255, 215, 120, 0.24);
      background: rgba(255,255,255,0.03);
    }

    .btn-secondary:hover {
      transform: translateY(-3px);
      background: rgba(255,255,255,0.06);
      border-color: rgba(255, 215, 120, 0.45);
    }

    .footer-note {
      margin-top: 26px;
      color: rgba(255,255,255,0.55);
      font-size: 13px;
      letter-spacing: 0.3px;
    }

    @media (max-width: 768px) {
      .card {
        padding: 44px 24px;
        border-radius: 22px;
      }

      .wrap {
        padding: 16px;
      }

      .actions {
        flex-direction: column;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="smoke">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
  </div>

  <div class="particles">
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
  </div>

  <div class="wrap">
    <div class="card">
      <div class="mini">Premium Experience Loading</div>

      <h1>Hachi Smoke & Vape</h1>

      <p class="subtitle">
        A refined new destination is on the way. We're building a bold digital experience with a sleek look, smooth motion, and elevated style.
      </p>

      <div class="status">
        <span class="dot"></span>
        <span>Website launching soon</span>
      </div>

      <div class="actions">
        <a href="#" class="btn btn-primary">Coming Soon</a>
        <a href="#" class="btn btn-secondary">Follow Updates</a>
      </div>

      <div class="footer-note">
        Stay tuned for the launch
      </div>
    </div>
  </div>
</body>
</html>
